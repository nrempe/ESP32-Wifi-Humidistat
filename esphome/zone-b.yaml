substitutions:
  zone: "Zone B"
  climate_entity: "climate.replace_me_zone_b"
  headroom_default: "5.0"
  ceiling_default: "50.0"
  deadband_default: "4.0"
  manual_target_default: "50.0"
  stale_forecast_limit_default: "35.0"

esphome:
  name: "esp32-humidistat-zone-b"
  friendly_name: "${zone}"
  min_version: 2024.11.0
  name_add_mac_suffix: false
  on_boot:
    priority: -10
    then:
      - delay: 30s
      - script.execute: recompute_humidity_target
      - script.execute: fetch_forecast_low
      - delay: 2s
      - script.execute: control_humidifier_relay

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key_zone_b
  services:
    - service: set_rh_headroom
      variables:
        headroom: float
      then:
        - lambda: |-
            float v = headroom;
            if (v < 0.0f) v = 0.0f;
            if (v > 10.0f) v = 10.0f;
            id(rh_headroom_pct) = v;
            id(headroom_rh_number).publish_state(v);
        - script.execute: recompute_humidity_target
    - service: set_rh_ceiling
      variables:
        ceiling: float
      then:
        - lambda: |-
            float v = ceiling;
            if (v < 10.0f) v = 10.0f;
            if (v > 60.0f) v = 60.0f;
            id(rh_ceiling_pct) = v;
            id(ceiling_rh_number).publish_state(v);

            float clamped = id(manual_rh_setpoint_number).state;
            if (clamped > v) clamped = v;
            if (clamped < 0.0f) clamped = 0.0f;
            id(manual_rh_setpoint) = clamped;
            id(manual_rh_setpoint_number).publish_state(clamped);
        - script.execute: recompute_humidity_target
    - service: set_rh_hysteresis
      variables:
        hysteresis: float
      then:
        - lambda: |-
            float v = hysteresis;
            if (v < 0.5f) v = 0.5f;
            if (v > 10.0f) v = 10.0f;
            id(rh_deadband_pct) = v;
            id(deadband_rh_number).publish_state(v);
        - script.execute: recompute_humidity_target
    - service: set_stale_forecast_rh_limit
      variables:
        limit: float
      then:
        - lambda: |-
            float v = limit;
            if (v < 10.0f) v = 10.0f;
            if (v > 60.0f) v = 60.0f;
            id(stale_forecast_rh_limit_pct) = v;
            id(stale_forecast_rh_limit_number).publish_state(v);
        - script.execute: recompute_humidity_target

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true
  id: bus_a

ota:
  - platform: esphome
    id: my_ota
    password: !secret ota_password_zone_b

time:
  - platform: homeassistant
    id: ha_time

switch:
  - platform: gpio
    pin: GPIO32
    name: "${zone} Humidifier Relay"
    id: humidifier_relay
    internal: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "${zone} Manual Humidity Control"
    id: manual_humidity_mode_switch
    entity_category: config
    restore_mode: RESTORE_DEFAULT_OFF
    lambda: |-
      return id(manual_mode_enabled);
    turn_on_action:
      - globals.set:
          id: manual_mode_enabled
          value: "true"
      - script.execute: recompute_humidity_target
    turn_off_action:
      - globals.set:
          id: manual_mode_enabled
          value: "false"
      - script.execute: recompute_humidity_target

binary_sensor:
  - platform: template
    name: "${zone} Humidifier Running"
    id: humidifier_running
    lambda: |-
      return id(humidifier_relay).state;

  - platform: template
    name: "${zone} Humidification Allowed"
    id: humidification_allowed
    lambda: |-
      return id(hvac_mode).state == "heat";

  - platform: template
    name: "${zone} Forecast Data Fresh"
    id: forecast_data_fresh
    device_class: connectivity
    lambda: |-
      if (id(forecast_updated_ms) == 0) return false;
      return (millis() - id(forecast_updated_ms)) < 7200000UL;

  - platform: template
    name: "${zone} Using Stale Forecast Fallback"
    id: using_stale_forecast_fallback
    lambda: |-
      if (id(manual_mode_enabled)) return false;
      if (id(forecast_updated_ms) == 0) return true;
      return (millis() - id(forecast_updated_ms)) >= 7200000UL;

http_request:
  useragent: esphome/device
  timeout: 15s
  verify_ssl: false
  buffer_size_rx: 8192
  id: http_request_data

text_sensor:
  - platform: homeassistant
    name: "${zone} HVAC Mode"
    id: hvac_mode
    entity_id: ${climate_entity}
    internal: true

  - platform: template
    name: "${zone} Forecast Last Updated"
    id: forecast_last_update
    icon: mdi:clock-check

  - platform: template
    name: "${zone} Humidity Control Mode"
    id: humidity_control_mode
    icon: mdi:tune-variant
    update_interval: 30s
    lambda: |-
      std::string mode = id(manual_mode_enabled) ? "Manual" : "Automatic";
      std::string hvac = id(hvac_mode).state.c_str();
      std::string status = hvac.empty() ? "HVAC Unknown" : "HVAC " + hvac;
      if (!id(manual_mode_enabled) && id(using_stale_forecast_fallback).state) {
        return mode + " / " + status + " / Fallback";
      }
      return mode + " / " + status;

sensor:
  - platform: am2315c
    temperature:
      name: "${zone} Local Temperature"
      id: local_temperature
    humidity:
      name: "${zone} Local Humidity"
      id: local_humidity

  - platform: homeassistant
    name: "${zone} Control Temperature"
    id: control_temperature_c
    entity_id: ${climate_entity}
    attribute: current_temperature
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    internal: true
    filters:
      - lambda: "return ((x - 32) * 5/9);"

  - platform: homeassistant
    name: "${zone} Control Humidity"
    id: control_humidity
    entity_id: ${climate_entity}
    attribute: current_humidity
    unit_of_measurement: "%"
    device_class: humidity
    state_class: measurement
    internal: true

  - platform: template
    name: "${zone} Control Temperature (Display)"
    id: control_temperature_f
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    update_interval: 30s
    lambda: |-
      if (isnan(id(control_temperature_c).state)) return NAN;
      return (id(control_temperature_c).state * 9.0f / 5.0f) + 32.0f;

  - platform: template
    name: "${zone} Forecast Low Temperature"
    id: forecast_low_temperature_c
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement

  - platform: template
    name: "${zone} Forecast Age Minutes"
    id: forecast_age_minutes
    unit_of_measurement: "min"
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 60s
    lambda: |-
      if (id(forecast_updated_ms) == 0) return NAN;
      return floorf((millis() - id(forecast_updated_ms)) / 60000.0f);

  - platform: template
    name: "${zone} Estimated Window Surface Temp"
    id: estimated_window_surface_temp_f
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement

  - platform: template
    name: "${zone} Active Humidity Setpoint"
    id: active_humidity_setpoint
    unit_of_measurement: "%"
    device_class: humidity
    state_class: measurement

  - platform: template
    name: "${zone} Condensation Limit RH"
    id: condensation_limit_rh
    unit_of_measurement: "%"
    device_class: humidity
    state_class: measurement

  - platform: template
    name: "${zone} Measured Control RH"
    id: measured_control_rh
    unit_of_measurement: "%"
    device_class: humidity
    state_class: measurement
    update_interval: 30s
    lambda: |-
      return id(control_humidity).state;

  - platform: template
    name: "${zone} Humidifier On Threshold"
    id: humidifier_on_threshold
    unit_of_measurement: "%"
    device_class: humidity
    state_class: measurement
    update_interval: 30s
    lambda: |-
      if (isnan(id(active_humidity_setpoint).state) || id(active_humidity_setpoint).state <= 0.0f) return NAN;
      float v = id(active_humidity_setpoint).state - id(rh_deadband_pct);
      if (v < 0.0f) v = 0.0f;
      return v;

  - platform: template
    name: "${zone} Humidifier Off Threshold"
    id: humidifier_off_threshold
    unit_of_measurement: "%"
    device_class: humidity
    state_class: measurement
    update_interval: 30s
    lambda: |-
      if (isnan(id(active_humidity_setpoint).state) || id(active_humidity_setpoint).state <= 0.0f) return NAN;
      float v = id(active_humidity_setpoint).state + id(rh_deadband_pct);
      if (v > 100.0f) v = 100.0f;
      return v;

number:
  - platform: template
    name: "${zone} Condensation Safety Margin"
    id: headroom_rh_number
    entity_category: config
    unit_of_measurement: "%"
    min_value: 0
    max_value: 10
    step: 0.5
    mode: slider
    restore_value: true
    optimistic: true
    initial_value: ${headroom_default}
    set_action:
      - globals.set:
          id: rh_headroom_pct
          value: !lambda "return x;"
      - script.execute: recompute_humidity_target

  - platform: template
    name: "${zone} Maximum Humidity Limit"
    id: ceiling_rh_number
    entity_category: config
    unit_of_measurement: "%"
    min_value: 10
    max_value: 60
    step: 1
    mode: slider
    restore_value: true
    optimistic: true
    initial_value: ${ceiling_default}
    set_action:
      - globals.set:
          id: rh_ceiling_pct
          value: !lambda "return x;"
      - lambda: |-
          float clamped = id(manual_rh_setpoint_number).state;
          if (clamped > x) clamped = x;
          if (clamped < 0.0f) clamped = 0.0f;
          id(manual_rh_setpoint) = clamped;
          id(manual_rh_setpoint_number).publish_state(clamped);
      - script.execute: recompute_humidity_target

  - platform: template
    name: "${zone} Humidity Half-Deadband"
    id: deadband_rh_number
    entity_category: config
    unit_of_measurement: "%"
    min_value: 0.5
    max_value: 10
    step: 0.5
    mode: slider
    restore_value: true
    optimistic: true
    initial_value: ${deadband_default}
    set_action:
      - globals.set:
          id: rh_deadband_pct
          value: !lambda "return x;"
      - script.execute: recompute_humidity_target

  - platform: template
    name: "${zone} Manual Humidity Setpoint"
    id: manual_rh_setpoint_number
    entity_category: config
    unit_of_measurement: "%"
    min_value: 10
    max_value: 60
    step: 1
    mode: slider
    restore_value: true
    optimistic: true
    initial_value: ${manual_target_default}
    set_action:
      - globals.set:
          id: manual_rh_setpoint
          value: !lambda |-
            float v = x;
            if (v < 0.0f) v = 0.0f;
            if (v > id(rh_ceiling_pct)) v = id(rh_ceiling_pct);
            return v;
      - lambda: |-
          float clamped = x;
          if (clamped < 0.0f) clamped = 0.0f;
          if (clamped > id(rh_ceiling_pct)) clamped = id(rh_ceiling_pct);
          if (clamped != x) id(manual_rh_setpoint_number).publish_state(clamped);
      - script.execute: recompute_humidity_target

  - platform: template
    name: "${zone} Stale Forecast RH Limit"
    id: stale_forecast_rh_limit_number
    entity_category: config
    unit_of_measurement: "%"
    min_value: 10
    max_value: 60
    step: 1
    mode: slider
    restore_value: true
    optimistic: true
    initial_value: ${stale_forecast_limit_default}
    set_action:
      - globals.set:
          id: stale_forecast_rh_limit_pct
          value: !lambda "return x;"
      - script.execute: recompute_humidity_target

globals:
  - id: rh_headroom_pct
    type: float
    restore_value: true
    initial_value: "${headroom_default}"

  - id: rh_ceiling_pct
    type: float
    restore_value: true
    initial_value: "${ceiling_default}"

  - id: rh_deadband_pct
    type: float
    restore_value: true
    initial_value: "${deadband_default}"

  - id: manual_mode_enabled
    type: bool
    restore_value: true
    initial_value: "false"

  - id: manual_rh_setpoint
    type: float
    restore_value: true
    initial_value: "${manual_target_default}"

  - id: forecast_updated_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"

  - id: stale_forecast_rh_limit_pct
    type: float
    restore_value: true
    initial_value: "${stale_forecast_limit_default}"

script:
  - id: recompute_humidity_target
    mode: restart
    then:
      - lambda: |-
          if (isnan(id(control_temperature_c).state) || isnan(id(control_humidity).state)) {
            ESP_LOGW("humidistat", "Control temperature/humidity not ready yet; skipping target recompute.");
            return;
          }

          const bool forecast_fresh =
            id(forecast_updated_ms) != 0 &&
            (millis() - id(forecast_updated_ms)) < 7200000UL &&
            !isnan(id(forecast_low_temperature_c).state);

          float rh_target = NAN;

          if (id(manual_mode_enabled)) {
            rh_target = id(manual_rh_setpoint);
            if (rh_target > id(rh_ceiling_pct)) rh_target = id(rh_ceiling_pct);
            if (rh_target < 0.0f) rh_target = 0.0f;
          } else if (forecast_fresh) {
            const float t_in_f = (id(control_temperature_c).state * 9.0f / 5.0f) + 32.0f;
            const float t_out_f = (id(forecast_low_temperature_c).state * 9.0f / 5.0f) + 32.0f;

            const float r_film = 0.68f;
            const float r_window = 1.55f;

            const float t_surface_f = t_in_f - (r_film / r_window) * (t_in_f - t_out_f);
            id(estimated_window_surface_temp_f).publish_state(t_surface_f);

            const float t_surface_c = (t_surface_f - 32.0f) * 5.0f / 9.0f;

            float rh_condensation_limit = 100.0f * expf(
              17.27f * t_surface_c / (243.04f + t_surface_c)
              - 17.27f * id(control_temperature_c).state / (243.04f + id(control_temperature_c).state)
            );
            if (rh_condensation_limit < 0.0f) rh_condensation_limit = 0.0f;
            if (rh_condensation_limit > 100.0f) rh_condensation_limit = 100.0f;
            id(condensation_limit_rh).publish_state(rh_condensation_limit);

            rh_target = rh_condensation_limit - id(rh_headroom_pct);
            if (rh_target > id(rh_ceiling_pct)) rh_target = id(rh_ceiling_pct);
            if (rh_target < 0.0f) rh_target = 0.0f;
          } else {
            id(estimated_window_surface_temp_f).publish_state(NAN);
            id(condensation_limit_rh).publish_state(NAN);
            rh_target = id(stale_forecast_rh_limit_pct);
            if (rh_target > id(rh_ceiling_pct)) rh_target = id(rh_ceiling_pct);
            if (rh_target < 0.0f) rh_target = 0.0f;
            ESP_LOGW("humidistat", "Using stale forecast fallback RH limit.");
          }

          id(active_humidity_setpoint).publish_state(rh_target);
      - script.execute: control_humidifier_relay

  - id: control_humidifier_relay
    mode: restart
    then:
      - lambda: |-
          const bool heat_mode_active = id(hvac_mode).state == "heat";

          if (!heat_mode_active) {
            if (id(humidifier_relay).state) {
              ESP_LOGI("humidistat", "HVAC mode is '%s'; forcing humidifier relay off.", id(hvac_mode).state.c_str());
              id(humidifier_relay).turn_off();
            }
            return;
          }

          if (isnan(id(control_humidity).state) ||
              isnan(id(active_humidity_setpoint).state) ||
              id(active_humidity_setpoint).state <= 0.0f) {
            if (id(humidifier_relay).state) {
              ESP_LOGW("humidistat", "Control input unavailable; forcing humidifier relay off.");
              id(humidifier_relay).turn_off();
            }
            return;
          }

          const float rh_target = id(active_humidity_setpoint).state;
          const float deadband = id(rh_deadband_pct);
          const bool relay_is_on = id(humidifier_relay).state;

          if (relay_is_on && id(control_humidity).state > rh_target + deadband) {
            id(humidifier_relay).turn_off();
          } else if (!relay_is_on && id(control_humidity).state < rh_target - deadband) {
            id(humidifier_relay).turn_on();
          }

  - id: fetch_forecast_low
    mode: restart
    then:
      - http_request.get:
          url: !secret owm_forecast_url
          capture_response: true
          max_response_buffer_size: 4096
          request_headers:
            Content-Type: application/json
          on_response:
            then:
              - lambda: |-
                  float forecast_low_c = NAN;
                  bool used_time_window = false;
                  auto now = id(ha_time).now();
                  const bool now_valid = now.is_valid();
                  const int32_t horizon_s = 24 * 60 * 60;

                  json::parse_json(body, [&](JsonObject root) -> bool {
                    auto list_var = root["list"];
                    if (!list_var.is<JsonArray>()) return true;

                    JsonArray list = list_var.as<JsonArray>();
                    float horizon_low_c = 9999.0f;
                    float overall_low_c = 9999.0f;
                    int horizon_count = 0;
                    int overall_count = 0;

                    for (JsonVariant v : list) {
                      JsonObject item = v.as<JsonObject>();
                      if (item.isNull()) continue;

                      JsonVariant main_v = item["main"];
                      if (!main_v.is<JsonObject>()) continue;

                      JsonVariant tmin_v = main_v["temp_min"];
                      JsonVariant temp_v = main_v["temp"];

                      bool has_tmin = (tmin_v.is<float>() || tmin_v.is<int>());
                      bool has_temp = (temp_v.is<float>() || temp_v.is<int>());
                      if (!has_tmin && !has_temp) continue;

                      float t = has_tmin ? tmin_v.as<float>() : temp_v.as<float>();
                      if (t < overall_low_c) overall_low_c = t;
                      overall_count++;

                      if (now_valid) {
                        JsonVariant dt_v = item["dt"];
                        bool has_dt = dt_v.is<int>() || dt_v.is<long>() || dt_v.is<float>();
                        if (has_dt) {
                          int32_t dt = dt_v.as<int32_t>();
                          if (dt >= now.timestamp && dt <= (now.timestamp + horizon_s)) {
                            if (t < horizon_low_c) horizon_low_c = t;
                            horizon_count++;
                          }
                        }
                      }
                    }

                    if (now_valid && horizon_count > 0) {
                      forecast_low_c = horizon_low_c;
                      used_time_window = true;
                    } else if (overall_count > 0) {
                      forecast_low_c = overall_low_c;
                    }
                    return true;
                  });

                  if (isnan(forecast_low_c) || forecast_low_c > 9000.0f) {
                    ESP_LOGW("humidistat", "Forecast parse produced no usable temperatures; skipping.");
                    return;
                  }

                  if (used_time_window) {
                    ESP_LOGI("humidistat", "Using next-24h forecast low: %.1f C", forecast_low_c);
                  } else {
                    ESP_LOGW("humidistat", "Fell back to full forecast low because no 24h forecast entries matched.");
                  }

                  id(forecast_low_temperature_c).publish_state(forecast_low_c);
                  id(forecast_updated_ms) = millis();

                  auto current_time = id(ha_time).now();
                  if (current_time.is_valid()) {
                    char buf[32];
                    current_time.strftime(buf, sizeof(buf), "%b %d, %I:%M %p");
                    id(forecast_last_update).publish_state(buf);
                  }
              - script.execute: recompute_humidity_target

interval:
  - interval: 30s
    then:
      - script.execute: control_humidifier_relay

  - interval: 10min
    then:
      - script.execute: fetch_forecast_low

  - interval: 5min
    then:
      - script.execute: recompute_humidity_target
